<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo circular -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#0d6efd" stroke-width="2" opacity="0.1"/>
  
  <!-- Símbolo de diente estilizado -->
  <g transform="translate(100, 100)">
    <!-- Diente principal -->
    <path d="M -15 -25 Q -20 -10 -18 5 Q -15 20 0 28 Q 15 20 18 5 Q 20 -10 15 -25 Q 0 -35 -15 -25 Z" 
          fill="#0d6efd" opacity="0.9"/>
    
    <!-- Brillo/reflejo -->
    <ellipse cx="-8" cy="-10" rx="6" ry="10" fill="white" opacity="0.4"/>
    
    <!-- Línea de sonrisa -->
    <path d="M -12 8 Q 0 15 12 8" stroke="#0a58ca" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Círculo decorativo externo -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#0d6efd" stroke-width="1" opacity="0.2"/>
</svg>
